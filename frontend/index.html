<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNGPC Xtract // Terminal</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="layout">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div>
                <div class="brand">SNGPC // XTRACTOR v2.5</div>

                <div class="controls">
                    <div style="margin-bottom: 24px;">
                        <div class="metric-big" id="percent-display">0%</div>
                        <div class="metric-label">STATUS EXTRAÇÃO</div>
                    </div>

                    <div style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="reuse-flag"
                            style="accent-color: var(--text-primary); cursor: pointer;">
                        <label for="reuse-flag"
                            style="font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); cursor: pointer;">
                            REUTILIZAR DADOS EXISTENTES
                        </label>
                    </div>

                    <button id="start-btn" class="btn" onclick="startExtraction()">
                        <span>INICIAR PROCESSO</span>
                    </button>

                    <button id="export-btn" class="btn" onclick="exportData()"
                        style="margin-top: 8px; background: var(--surface); color: var(--text-primary); border: 1px solid var(--border);">
                        <span>EXPORTAR CSV</span>
                    </button>
                </div>
            </div>

            <div class="progress-module">
                <div class="metric-label" id="status-text" style="margin-bottom:12px;">AGUARDANDO COMANDO</div>
                <div class="progress-track">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </aside>

        <!-- Main Data View -->
        <main>
            <div class="status-bar">
                <div class="status-indicator">
                    <div id="connection-dot" class="status-dot active"></div>
                    <span id="connection-text">SISTEMA CONECTADO</span>
                </div>
                <div class="status-indicator">
                    <input type="text" id="search-input" placeholder="BUSCAR (NOME, PRINCÍPIO, REGISTRO)..."
                        style="padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-mono); font-size: 11px; width: 300px; text-transform: uppercase;">
                </div>
                <div class="status-indicator">
                    <span>REGISTROS TOTAIS: </span>
                    <span id="total-badge" style="color: var(--text-primary); margin-left:8px;">--</span>
                </div>
            </div>

            <div class="data-container">
                <div style="flex: 1; overflow: auto;">
                    <table id="results-table">
                        <thead>
                            <tr>
                                <th>CÓDIGO</th>
                                <th>PRODUTO</th>
                                <th>REGISTRO MS</th>
                                <th>TARJA</th>
                                <th>PRINCIPIO ATIVO</th>
                                <th>CLASSES TERAPÊUTICAS</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Rows injected here by JavaScript -->
                        </tbody>
                    </table>

                    <div id="empty-state" class="empty-state">
                        <p style="font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.05em;">
                            NENHUM DADO CARREGADO NO BUFFER
                        </p>
                    </div>
                </div>

                <div id="pagination" class="pagination" style="display:none;"></div>
            </div>

            <!-- Terminal Footer -->
            <div id="terminal" class="log-terminal">
                <div class="log-line">Initializing console stream...</div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>

</html>
